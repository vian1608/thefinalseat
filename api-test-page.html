<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test - Qatar Airways</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 2rem; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .status { padding: 1rem; margin: 1rem 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        button { background: #8B1538; color: white; border: none; padding: 1rem 2rem; border-radius: 5px; cursor: pointer; margin: 0.5rem; }
        button:hover { background: #6B0F2A; }
        .log { background: #f8f9fa; padding: 1rem; border-radius: 5px; font-family: monospace; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 API Configuration Test</h1>
        
        <div id="status"></div>
        
        <button onclick="testAPI()">Test FlightAPI.io</button>
        <button onclick="testSearch()">Test Flight Search</button>
        <button onclick="clearLog()">Clear Log</button>
        
        <h3>Console Log:</h3>
        <div id="log" class="log"></div>
    </div>

    <script src="api-config.js"></script>
    <script src="flight-api.js"></script>
    <script>
        let logDiv = document.getElementById('log');
        let statusDiv = document.getElementById('status');
        
        function log(message) {
            console.log(message);
            logDiv.textContent += message + '\n';
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        function clearLog() {
            logDiv.textContent = '';
        }
        
        function showStatus(message, type = 'info') {
            statusDiv.innerHTML = `<div class="status ${type}">${message}</div>`;
        }
        
        async function testAPI() {
            log('🚀 Testing API Configuration...');
            
            try {
                // Check if API_CONFIG is loaded
                if (typeof API_CONFIG === 'undefined') {
                    log('❌ API_CONFIG not found');
                    showStatus('API_CONFIG not loaded', 'error');
                    return;
                }
                
                log('✅ API_CONFIG loaded');
                
                // Check Amadeus API configuration
                if (window.validateAPIConfig) {
                    const isValid = validateAPIConfig();
                    if (isValid) {
                        const config = getAmadeusConfig();
                        log('✅ Amadeus API configured');
                        log('📊 Base URL: ' + config.baseURL);
                        log('📊 Environment: ' + config.environment);
                        showStatus('✅ Amadeus API is configured and ready!', 'success');
                    } else {
                        log('❌ Amadeus API not configured');
                        showStatus('Amadeus API not configured', 'error');
                    }
                } else {
                    log('❌ validateAPIConfig function not found');
                    showStatus('API validation function not found', 'error');
                }
                
            } catch (error) {
                log('❌ Error: ' + error.message);
                showStatus('Error: ' + error.message, 'error');
            }
        }
        
        async function testSearch() {
            log('🔍 Testing Flight Search with Amadeus API...');
            
            if (!window.flightSearchManager || !window.validateAPIConfig || !validateAPIConfig()) {
                log('❌ Amadeus API not configured');
                showStatus('Amadeus API not configured', 'error');
                return;
            }
            
            const searchParams = {
                from: 'NYC',
                to: 'LAX',
                departure: '2024-12-15',
                passengers: 1,
                class: 'economy'
            };
            
            try {
                log('🌐 Making search request...');
                await window.flightSearchManager.searchFlights(searchParams);
                log('✅ Search completed');
                showStatus('✅ Search initiated successfully', 'success');
                
            } catch (error) {
                log('❌ Search error: ' + error.message);
                showStatus('Search failed: ' + error.message, 'error');
            }
        }
        
        // Auto-test on load
        document.addEventListener('DOMContentLoaded', function() {
            log('📄 Page loaded, starting auto-test...');
            setTimeout(testAPI, 1000);
        });
    </script>
</body>
</html>
