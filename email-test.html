<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email System Test - Urgent Travel</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 2rem; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .test-section { margin: 2rem 0; padding: 1rem; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 1rem 2rem; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; margin: 0.5rem; }
        button:hover { background: #5a6fd8; }
        .log { background: #f8f9fa; padding: 1rem; border-radius: 5px; font-family: monospace; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
        .status { padding: 0.5rem; border-radius: 5px; margin: 0.5rem 0; }
        .status.success { background: #d4edda; color: #155724; }
        .status.warning { background: #fff3cd; color: #856404; }
        .status.error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📧 Email System Test</h1>
        
        <div class="test-section">
            <h3>EmailJS Status</h3>
            <div id="emailjsStatus" class="status">Checking...</div>
            <button onclick="checkEmailJSStatus()">Check EmailJS Status</button>
        </div>
        
        <div class="test-section">
            <h3>Test Email Sending</h3>
            <button onclick="testEmailSending()">Send Test Email</button>
            <button onclick="testFallbackEmail()">Test Fallback Email</button>
        </div>
        
        <div class="test-section">
            <h3>Console Log:</h3>
            <div id="log" class="log"></div>
        </div>
    </div>

    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="email-config.js"></script>
    <script>
        function log(message) {
            console.log(message);
            const logDiv = document.getElementById('log');
            logDiv.textContent += message + '\n';
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        function updateStatus(message, type = 'warning') {
            const statusDiv = document.getElementById('emailjsStatus');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
        }
        
        // Check EmailJS status
        function checkEmailJSStatus() {
            log('🔍 Checking EmailJS status...');
            
            if (typeof emailjs !== 'undefined') {
                log('✅ EmailJS SDK loaded');
                updateStatus('EmailJS SDK is loaded', 'success');
                
                // Try to initialize
                try {
                    emailjs.init('test_key');
                    log('✅ EmailJS can be initialized');
                    updateStatus('EmailJS SDK loaded and ready', 'success');
                } catch (error) {
                    log('⚠️ EmailJS initialization failed: ' + error.message);
                    updateStatus('EmailJS loaded but initialization failed', 'warning');
                }
            } else {
                log('❌ EmailJS SDK not loaded');
                updateStatus('EmailJS SDK not loaded', 'error');
            }
        }
        
        // Test email sending
        async function testEmailSending() {
            log('📧 Testing email sending...');
            
            const testBookingData = {
                bookingReference: 'UT' + Math.random().toString(36).substr(2, 8).toUpperCase(),
                firstName: 'John',
                lastName: 'Smith',
                email: 'john.smith@test.com',
                phone: '+1-555-123-4567',
                paymentMethod: 'creditCard',
                flight: {
                    airline: 'Test Airlines',
                    flightNumber: 'TA123',
                    departure: {
                        airport: 'Test Airport (TST)',
                        time: '10:00',
                        date: '2024-12-01'
                    },
                    arrival: {
                        airport: 'Destination Airport (DST)',
                        time: '14:00',
                        date: '2024-12-01'
                    },
                    duration: '4h 00m',
                    class: 'Economy',
                    price: '$299'
                },
                subtotal: '$299.00',
                taxes: '$35.88',
                total: '$334.88'
            };
            
            try {
                if (typeof sendBookingEmail === 'function') {
                    log('📧 Calling sendBookingEmail...');
                    const result = await sendBookingEmail(testBookingData);
                    log('📧 Email result: ' + JSON.stringify(result));
                    
                    if (result.success) {
                        updateStatus('Email sent successfully!', 'success');
                    } else {
                        updateStatus('Email failed: ' + result.message, 'warning');
                    }
                } else {
                    log('❌ sendBookingEmail function not available');
                    updateStatus('Email functions not loaded', 'error');
                }
            } catch (error) {
                log('❌ Email test failed: ' + error.message);
                updateStatus('Email test failed: ' + error.message, 'error');
            }
        }
        
        // Test fallback email
        function testFallbackEmail() {
            log('📧 Testing fallback email...');
            
            const testBookingData = {
                bookingReference: 'UT' + Math.random().toString(36).substr(2, 8).toUpperCase(),
                firstName: 'Jane',
                lastName: 'Doe',
                email: 'jane.doe@test.com',
                phone: '+1-555-987-6543',
                paymentMethod: 'paypal',
                flight: {
                    airline: 'Fallback Airlines',
                    flightNumber: 'FA456',
                    departure: {
                        airport: 'Fallback Airport (FBA)',
                        time: '15:30',
                        date: '2024-12-02'
                    },
                    arrival: {
                        airport: 'Return Airport (RTA)',
                        time: '19:45',
                        date: '2024-12-02'
                    },
                    duration: '4h 15m',
                    class: 'Business',
                    price: '$599'
                },
                subtotal: '$599.00',
                taxes: '$71.88',
                total: '$670.88'
            };
            
            try {
                if (typeof sendFallbackEmail === 'function') {
                    log('📧 Calling sendFallbackEmail...');
                    const result = sendFallbackEmail(testBookingData);
                    log('📧 Fallback result: ' + JSON.stringify(result));
                    updateStatus('Fallback email opened in email client', 'success');
                } else {
                    log('❌ sendFallbackEmail function not available');
                    updateStatus('Fallback functions not loaded', 'error');
                }
            } catch (error) {
                log('❌ Fallback test failed: ' + error.message);
                updateStatus('Fallback test failed: ' + error.message, 'error');
            }
        }
        
        // Auto-check EmailJS status on page load
        document.addEventListener('DOMContentLoaded', function() {
            log('🚀 Email system test page loaded');
            setTimeout(checkEmailJSStatus, 1000);
        });
    </script>
</body>
</html>
