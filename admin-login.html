<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Urgent Travel</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth-styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .admin-login-container {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--qa-burgundy) 0%, var(--qa-burgundy-dark) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .admin-login-card {
            background: white;
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        
        .admin-logo {
            margin-bottom: 2rem;
        }
        
        .admin-logo i {
            font-size: 3rem;
            color: var(--qa-burgundy);
            margin-bottom: 1rem;
        }
        
        .admin-logo h1 {
            color: var(--qa-burgundy);
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0;
        }
        
        .admin-logo p {
            color: var(--qa-text-medium);
            font-size: 0.9rem;
            margin: 0.5rem 0 0 0;
        }
        
        .admin-form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        
        .admin-form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--qa-text-dark);
            font-weight: 500;
        }
        
        .admin-form-group input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        
        .admin-form-group input:focus {
            outline: none;
            border-color: var(--qa-burgundy);
            box-shadow: 0 0 0 3px rgba(139, 21, 56, 0.1);
        }
        
        .admin-login-btn {
            width: 100%;
            padding: 1rem;
            background: var(--qa-gradient-primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }
        
        .admin-login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(139, 21, 56, 0.3);
        }
        
        .admin-login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .back-to-site {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #e5e7eb;
        }
        
        .back-to-site a {
            color: var(--qa-burgundy);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        
        .back-to-site a:hover {
            color: var(--qa-burgundy-dark);
        }
        
        .error-message {
            color: #dc3545;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
        }
        
        .success-message {
            color: #28a745;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
        }
        
        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid #ffffff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 0.5rem;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .admin-info {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 2rem;
            font-size: 0.875rem;
            color: var(--qa-text-medium);
        }
        
        .admin-info strong {
            color: var(--qa-burgundy);
        }
    </style>
</head>
<body>
    <div class="admin-login-container">
        <div class="admin-login-card">
            <div class="admin-logo">
                <i class="fas fa-shield-alt"></i>
                <h1>Admin Panel</h1>
                <p>Urgent Travel Management System</p>
            </div>
            
            <div class="admin-info">
                <strong>Demo Credentials:</strong><br>
                Username: <code>admin</code><br>
                Password: <code>admin123</code>
            </div>
            
            <form id="adminLoginForm">
                <div class="admin-form-group">
                    <label for="username">
                        <i class="fas fa-user"></i> Username
                    </label>
                    <input type="text" id="username" name="username" required placeholder="Enter your username">
                    <div class="error-message" id="usernameError"></div>
                </div>
                
                <div class="admin-form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                    <div class="error-message" id="passwordError"></div>
                </div>
                
                <button type="submit" class="admin-login-btn" id="loginBtn">
                    <div class="loading-spinner" id="loadingSpinner"></div>
                    <span id="loginText">Login to Admin Panel</span>
                </button>
                
                <div class="error-message" id="loginError"></div>
                <div class="success-message" id="loginSuccess"></div>
            </form>
            
            <div class="back-to-site">
                <a href="index.html">
                    <i class="fas fa-arrow-left"></i> Back to Main Site
                </a>
            </div>
        </div>
    </div>

    <script src="admin-auth.js"></script>
</body>
</html>
