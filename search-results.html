<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Search Results - Urgent Travel</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .search-results-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .results-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            border-radius: 15px;
            margin-bottom: 2rem;
            text-align: center;
        }
        
        .search-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .search-info {
            background: rgba(255,255,255,0.1);
            padding: 1rem;
            border-radius: 10px;
            text-align: center;
        }
        
        .search-info i {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            display: block;
        }
        
        .flight-results {
            margin-top: 2rem;
        }
        
        .no-results {
            text-align: center;
            padding: 3rem;
            background: #f8fafc;
            border-radius: 15px;
            color: #64748b;
        }
        
        .no-results i {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #cbd5e1;
        }
        
        .loading-results {
            text-align: center;
            padding: 3rem;
            background: #f8fafc;
            border-radius: 15px;
        }
        
        .loading-spinner {
            font-size: 2rem;
            color: #667eea;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .back-to-search {
            position: fixed;
            top: 2rem;
            left: 2rem;
            background: white;
            color: #667eea;
            padding: 0.75rem 1.5rem;
            border-radius: 25px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            z-index: 1000;
        }
        
        .back-to-search:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }
        
        @media (max-width: 768px) {
            .search-results-container {
                padding: 1rem;
            }
            
            .results-header {
                padding: 1.5rem;
            }
            
            .search-summary {
                grid-template-columns: 1fr;
            }
            
            .back-to-search {
                top: 1rem;
                left: 1rem;
                padding: 0.5rem 1rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-to-search">
        <i class="fas fa-arrow-left"></i> Back to Search
    </a>
    
    <div class="search-results-container">
        <div class="results-header">
            <h1><i class="fas fa-search"></i> Flight Search Results</h1>
            <div class="search-summary" id="searchSummary">
                <!-- Search details will be populated here -->
            </div>
        </div>
        
        <div class="flight-results" id="flightResults">
            <div class="loading-results">
                <div class="loading-spinner">
                    <i class="fas fa-spinner"></i>
                </div>
                <h3>Searching for flights...</h3>
                <p>Please wait while we find the best options for you.</p>
            </div>
        </div>
    </div>

    <script src="api-config.js"></script>
    <script src="flight-api.js"></script>
    <script>
        // Get search parameters from URL
        const urlParams = new URLSearchParams(window.location.search);
        const searchData = {
            from: urlParams.get('from') || '',
            to: urlParams.get('to') || '',
            departure: urlParams.get('departure') || '',
            return: urlParams.get('return') || '',
            passengers: urlParams.get('passengers') || '1',
            class: urlParams.get('class') || 'economy'
        };

        // Display search summary
        function displaySearchSummary() {
            const summaryContainer = document.getElementById('searchSummary');
            summaryContainer.innerHTML = `
                <div class="search-info">
                    <i class="fas fa-plane-departure"></i>
                    <div><strong>From</strong></div>
                    <div>${searchData.from}</div>
                </div>
                <div class="search-info">
                    <i class="fas fa-plane-arrival"></i>
                    <div><strong>To</strong></div>
                    <div>${searchData.to}</div>
                </div>
                <div class="search-info">
                    <i class="fas fa-calendar-alt"></i>
                    <div><strong>Departure</strong></div>
                    <div>${formatDate(searchData.departure)}</div>
                </div>
                ${searchData.return ? `
                <div class="search-info">
                    <i class="fas fa-calendar-alt"></i>
                    <div><strong>Return</strong></div>
                    <div>${formatDate(searchData.return)}</div>
                </div>
                ` : ''}
                <div class="search-info">
                    <i class="fas fa-users"></i>
                    <div><strong>Passengers</strong></div>
                    <div>${searchData.passengers}</div>
                </div>
                <div class="search-info">
                    <i class="fas fa-chair"></i>
                    <div><strong>Class</strong></div>
                    <div>${searchData.class}</div>
                </div>
            `;
        }

        // Format date for display
        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', {
                weekday: 'short',
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
        }

        // Search for flights
        async function searchFlights() {
            try {
                console.log('🔍 Starting flight search with data:', searchData);
                
                // Use Amadeus API
                if (window.flightSearchManager && window.validateAPIConfig && validateAPIConfig()) {
                    console.log('✅ Amadeus API configured');
                    console.log('🔍 Searching with Amadeus API...');
                    await flightSearchManager.searchFlights(searchData);
                } else {
                    console.log('❌ Amadeus API not configured, using mock data');
                    const mockFlights = getMockFlightData();
                    displayFlightResults(mockFlights);
                }
                
            } catch (error) {
                console.error('❌ Search failed:', error);
                showNoResults();
            }
        }

        // Display flight results
        function displayFlightResults(flights) {
            const resultsContainer = document.getElementById('flightResults');
            
            if (!flights || flights.length === 0) {
                showNoResults();
                return;
            }

            let resultsHTML = `
                <div class="results-info">
                    <h3><i class="fas fa-plane"></i> Found ${flights.length} flight${flights.length > 1 ? 's' : ''}</h3>
                    <p>Showing the best options for your search</p>
                </div>
            `;

            flights.forEach((flight, index) => {
                resultsHTML += createFlightCard(flight, index);
            });

            resultsContainer.innerHTML = resultsHTML;
        }

        // Create flight card
        function createFlightCard(flight, index) {
            const departureTime = flight.departureTime || '10:30';
            const arrivalTime = flight.arrivalTime || '14:45';
            const duration = flight.duration || '4h 15m';
            const price = flight.price || '$299';
            const airline = flight.airline || 'Airline';
            const flightNumber = flight.flightNumber || 'AA1234';

            return `
                <div class="flight-card" data-flight-id="flight-${index}">
                    <div class="flight-header">
                        <div class="airline-info">
                            <i class="fas fa-plane"></i>
                            <span class="airline-name">${airline}</span>
                            <span class="flight-number">${flightNumber}</span>
                        </div>
                        <div class="flight-price">
                            <span class="price">${price}</span>
                            <span class="price-per-person">per person</span>
                        </div>
                    </div>
                    
                    <div class="flight-details">
                        <div class="departure-info">
                            <div class="time">${departureTime}</div>
                            <div class="airport">${searchData.from}</div>
                            <div class="date">${formatDate(searchData.departure)}</div>
                        </div>
                        
                        <div class="flight-path">
                            <div class="duration">${duration}</div>
                            <div class="path-line">
                                <i class="fas fa-circle"></i>
                                <div class="line"></div>
                                <i class="fas fa-plane"></i>
                                <div class="line"></div>
                                <i class="fas fa-circle"></i>
                            </div>
                        </div>
                        
                        <div class="arrival-info">
                            <div class="time">${arrivalTime}</div>
                            <div class="airport">${searchData.to}</div>
                            <div class="date">${formatDate(searchData.departure)}</div>
                        </div>
                    </div>
                    
                    <div class="flight-actions">
                        <button class="book-btn" onclick="bookFlight('flight-${index}')">
                            <i class="fas fa-credit-card"></i> Book Now
                        </button>
                        <button class="details-btn" onclick="showFlightDetails('flight-${index}')">
                            <i class="fas fa-info-circle"></i> Details
                        </button>
                    </div>
                </div>
            `;
        }

        // Show no results
        function showNoResults() {
            const resultsContainer = document.getElementById('flightResults');
            resultsContainer.innerHTML = `
                <div class="no-results">
                    <i class="fas fa-search"></i>
                    <h3>No flights found</h3>
                    <p>We couldn't find any flights matching your search criteria.</p>
                    <p>Try adjusting your search parameters or dates.</p>
                </div>
            `;
        }

        // Get mock flight data
        function getMockFlightData() {
            return [
                {
                    airline: 'American Airlines',
                    flightNumber: 'AA1234',
                    departureTime: '08:30',
                    arrivalTime: '12:45',
                    duration: '4h 15m',
                    price: '$299',
                    stops: 'Non-stop'
                },
                {
                    airline: 'Delta Airlines',
                    flightNumber: 'DL5678',
                    departureTime: '14:20',
                    arrivalTime: '18:35',
                    duration: '4h 15m',
                    price: '$325',
                    stops: 'Non-stop'
                },
                {
                    airline: 'United Airlines',
                    flightNumber: 'UA9012',
                    departureTime: '19:45',
                    arrivalTime: '23:55',
                    duration: '4h 10m',
                    price: '$275',
                    stops: 'Non-stop'
                }
            ];
        }

        // Book flight
        function bookFlight(flightId) {
            const flightCard = document.querySelector(`[data-flight-id="${flightId}"]`);
            const flightData = {
                airline: flightCard.querySelector('.airline-name').textContent,
                flightNumber: flightCard.querySelector('.flight-number').textContent,
                departureTime: flightCard.querySelector('.departure-info .time').textContent,
                arrivalTime: flightCard.querySelector('.arrival-info .time').textContent,
                duration: flightCard.querySelector('.duration').textContent,
                price: flightCard.querySelector('.price').textContent,
                from: searchData.from,
                to: searchData.to,
                departure: searchData.departure,
                return: searchData.return,
                passengers: searchData.passengers,
                class: searchData.class
            };
            
            sessionStorage.setItem('selectedFlight', JSON.stringify(flightData));
            window.location.href = 'booking.html';
        }

        // Show flight details
        function showFlightDetails(flightId) {
            alert('Flight details feature coming soon!');
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            displaySearchSummary();
            searchFlights();
        });
    </script>
</body>
</html>
