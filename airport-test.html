<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airport Search Test - Qatar Airways</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 2rem; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .test-section { margin: 2rem 0; padding: 1rem; border: 1px solid #ddd; border-radius: 5px; }
        input { width: 100%; padding: 1rem; border: 1px solid #ddd; border-radius: 5px; font-size: 1rem; }
        .suggestions { background: white; border: 1px solid #ddd; border-top: none; max-height: 200px; overflow-y: auto; }
        .suggestion-item { padding: 0.75rem; cursor: pointer; border-bottom: 1px solid #eee; }
        .suggestion-item:hover { background: #f8f9fa; }
        .log { background: #f8f9fa; padding: 1rem; border-radius: 5px; font-family: monospace; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏢 Airport Search Test</h1>
        
        <div class="test-section">
            <h3>Test Airport Search</h3>
            <p>Type airport codes or city names (e.g., "JFK", "LAX", "New York", "Los Angeles")</p>
            <input type="text" id="airportInput" placeholder="Enter airport code or city name..." />
            <div id="suggestions" class="suggestions" style="display: none;"></div>
        </div>
        
        <div class="test-section">
            <h3>Console Log:</h3>
            <div id="log" class="log"></div>
        </div>
    </div>

    <script src="api-config.js"></script>
    <script src="flight-api.js"></script>
    <script>
        function log(message) {
            console.log(message);
            const logDiv = document.getElementById('log');
            logDiv.textContent += message + '\n';
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        // Initialize Amadeus API
        document.addEventListener('DOMContentLoaded', async function() {
            log('🚀 Initializing Amadeus API...');
            if (window.validateAPIConfig) {
                const isValid = validateAPIConfig();
                log('✅ Amadeus API ' + (isValid ? 'configured' : 'not configured'));
            }
        });
        
        // Airport input handling
        const airportInput = document.getElementById('airportInput');
        const suggestionsDiv = document.getElementById('suggestions');
        
        airportInput.addEventListener('input', async function() {
            const query = this.value.trim();
            
            if (query.length >= 2) {
                log('🔍 Searching airports for: ' + query);
                
                try {
                    let airports = [];
                    if (window.flightAPI && window.validateAPIConfig && validateAPIConfig()) {
                        airports = await window.flightAPI.getAirportSuggestions(query);
                    } else {
                        log('⚠️ Using mock airport data');
                        airports = [
                            { code: 'JFK', name: 'John F. Kennedy International', city: 'New York' },
                            { code: 'LAX', name: 'Los Angeles International', city: 'Los Angeles' }
                        ];
                    }
                    log('✅ Found ' + airports.length + ' airports');
                    
                    if (airports.length > 0) {
                        displaySuggestions(airports);
                    } else {
                        hideSuggestions();
                    }
                } catch (error) {
                    log('❌ Airport search error: ' + error.message);
                    hideSuggestions();
                }
            } else {
                hideSuggestions();
            }
        });
        
        function displaySuggestions(airports) {
            suggestionsDiv.innerHTML = '';
            
            airports.forEach(airport => {
                const item = document.createElement('div');
                item.className = 'suggestion-item';
                item.textContent = airport.fullName || `${airport.name} (${airport.code})`;
                item.onclick = () => {
                    airportInput.value = airport.fullName || `${airport.name} (${airport.code})`;
                    hideSuggestions();
                    log('✅ Selected: ' + airport.fullName);
                };
                suggestionsDiv.appendChild(item);
            });
            
            suggestionsDiv.style.display = 'block';
        }
        
        function hideSuggestions() {
            suggestionsDiv.style.display = 'none';
        }
        
        // Hide suggestions when clicking outside
        document.addEventListener('click', function(e) {
            if (!airportInput.contains(e.target) && !suggestionsDiv.contains(e.target)) {
                hideSuggestions();
            }
        });
    </script>
</body>
</html>
