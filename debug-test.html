<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Test - Qatar Airways</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 2rem; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .test-section { margin: 2rem 0; padding: 1rem; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #8B1538; color: white; border: none; padding: 1rem 2rem; border-radius: 5px; cursor: pointer; margin: 0.5rem; }
        button:hover { background: #6B0F2A; }
        .log { background: #f8f9fa; padding: 1rem; border-radius: 5px; font-family: monospace; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
        .flight-card { border: 1px solid #ddd; padding: 1rem; margin: 1rem 0; border-radius: 5px; }
        .book-btn { background: #28a745; color: white; border: none; padding: 0.5rem 1rem; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Debug Test Page</h1>
        
        <div class="test-section">
            <h3>1. Test API Configuration</h3>
            <button onclick="testConfig()">Test Config</button>
            <div id="config-log" class="log"></div>
        </div>
        
        <div class="test-section">
            <h3>2. Test Flight Search</h3>
            <button onclick="testSearch()">Test Search</button>
            <div id="search-log" class="log"></div>
        </div>
        
        <div class="test-section">
            <h3>3. Test Booking</h3>
            <button onclick="createTestFlight()">Create Test Flight</button>
            <div id="booking-log" class="log"></div>
            <div id="test-flights"></div>
        </div>
        
        <div class="test-section">
            <h3>4. Test Book Flight Function</h3>
            <button onclick="testBookFunction()">Test Book Function</button>
            <div id="book-log" class="log"></div>
        </div>
    </div>

    <script src="api-config.js"></script>
    <script src="flight-api.js"></script>
    <script src="script.js"></script>
    <script>
        function log(elementId, message) {
            const logDiv = document.getElementById(elementId);
            logDiv.textContent += message + '\n';
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }
        
        function clearLog(elementId) {
            document.getElementById(elementId).textContent = '';
        }
        
        async function testConfig() {
            clearLog('config-log');
            log('config-log', '🚀 Testing API Configuration...');
            
            try {
                if (typeof API_CONFIG === 'undefined') {
                    log('config-log', '❌ API_CONFIG not found');
                    return;
                }
                
                log('config-log', '✅ API_CONFIG loaded');
                if (window.validateAPIConfig) {
                    const isValid = validateAPIConfig();
                    log('config-log', '🔑 Amadeus API ' + (isValid ? 'configured' : 'not configured'));
                    if (isValid) {
                        const config = getAmadeusConfig();
                        log('config-log', '📊 Base URL: ' + config.baseURL);
                        log('config-log', '📊 Environment: ' + config.environment);
                    }
                }
                
            } catch (error) {
                log('config-log', '❌ Error: ' + error.message);
            }
        }
        
        async function testSearch() {
            clearLog('search-log');
            log('search-log', '🔍 Testing Flight Search with Amadeus API...');
            
            if (!window.flightSearchManager || !window.validateAPIConfig || !validateAPIConfig()) {
                log('search-log', '❌ Amadeus API not configured');
                return;
            }
            
            const searchParams = {
                from: 'NYC',
                to: 'LAX',
                departure: '2024-12-15',
                passengers: 1,
                class: 'economy'
            };
            
            try {
                log('search-log', '🌐 Making search request...');
                await window.flightSearchManager.searchFlights(searchParams);
                log('search-log', '✅ Search completed');
                
            } catch (error) {
                log('search-log', '❌ Search error: ' + error.message);
            }
        }
        
        function createTestFlight() {
            clearLog('booking-log');
            log('booking-log', '🎫 Creating test flight card...');
            
            const testFlightsDiv = document.getElementById('test-flights');
            testFlightsDiv.innerHTML = `
                <div class="flight-card" data-flight-id="test-flight-1">
                    <div class="flight-header">
                        <div class="airline-info">
                            <h4>Test Airlines</h4>
                            <span class="flight-number">TA1234</span>
                        </div>
                    </div>
                    <div class="flight-route">
                        <div class="departure">
                            <div class="time">10:30</div>
                            <div class="airport">NYC</div>
                            <div class="date">Mon, Dec 15, 2024</div>
                        </div>
                        <div class="flight-path">
                            <div class="duration">4h 15m</div>
                            <div class="stops">Direct</div>
                        </div>
                        <div class="arrival">
                            <div class="time">14:45</div>
                            <div class="airport">LAX</div>
                            <div class="date">Mon, Dec 15, 2024</div>
                        </div>
                    </div>
                    <div class="flight-footer">
                        <div class="price-info">
                            <div class="current-price">$299</div>
                        </div>
                        <button class="book-btn" onclick="bookFlight('test-flight-1')">
                            <i class="fas fa-shopping-cart"></i> Book Now
                        </button>
                    </div>
                </div>
            `;
            
            log('booking-log', '✅ Test flight card created');
        }
        
        function testBookFunction() {
            clearLog('book-log');
            log('book-log', '🎫 Testing bookFlight function...');
            
            try {
                // Test if bookFlight function exists
                if (typeof bookFlight === 'function') {
                    log('book-log', '✅ bookFlight function exists');
                    
                    // Test if extractFlightDataFromCard function exists
                    if (typeof extractFlightDataFromCard === 'function') {
                        log('book-log', '✅ extractFlightDataFromCard function exists');
                        
                        // Test extracting data from test flight
                        const testFlightCard = document.querySelector('[data-flight-id="test-flight-1"]');
                        if (testFlightCard) {
                            log('book-log', '✅ Test flight card found');
                            const flightData = extractFlightDataFromCard(testFlightCard);
                            log('book-log', '📊 Extracted data: ' + JSON.stringify(flightData, null, 2));
                        } else {
                            log('book-log', '❌ Test flight card not found');
                        }
                    } else {
                        log('book-log', '❌ extractFlightDataFromCard function not found');
                    }
                } else {
                    log('book-log', '❌ bookFlight function not found');
                }
                
            } catch (error) {
                log('book-log', '❌ Error: ' + error.message);
            }
        }
        
        // Auto-test on load
        document.addEventListener('DOMContentLoaded', function() {
            log('config-log', '📄 Page loaded, starting auto-test...');
            setTimeout(testConfig, 1000);
        });
    </script>
</body>
</html>
