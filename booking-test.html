<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Test - Qatar Airways</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 2rem; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .flight-card { border: 1px solid #ddd; padding: 1rem; margin: 1rem 0; border-radius: 5px; background: white; }
        .book-btn { background: #28a745; color: white; border: none; padding: 0.5rem 1rem; border-radius: 3px; cursor: pointer; }
        .book-btn:hover { background: #218838; }
        .log { background: #f8f9fa; padding: 1rem; border-radius: 5px; font-family: monospace; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎫 Booking Test</h1>
        
        <div class="flight-card" data-flight-id="test-flight-1">
            <div class="flight-header">
                <div class="airline-info">
                    <h4>Test Airlines</h4>
                    <span class="flight-number">TA1234</span>
                </div>
            </div>
            <div class="flight-route">
                <div class="departure">
                    <div class="time">10:30</div>
                    <div class="airport">NYC</div>
                    <div class="date">Mon, Dec 15, 2024</div>
                </div>
                <div class="flight-path">
                    <div class="duration">4h 15m</div>
                    <div class="stops">Direct</div>
                </div>
                <div class="arrival">
                    <div class="time">14:45</div>
                    <div class="airport">LAX</div>
                    <div class="date">Mon, Dec 15, 2024</div>
                </div>
            </div>
            <div class="flight-footer">
                <div class="price-info">
                    <div class="current-price">$299</div>
                </div>
                <button class="book-btn" onclick="bookFlight('test-flight-1')">
                    <i class="fas fa-shopping-cart"></i> Book Now
                </button>
            </div>
        </div>
        
        <h3>Console Log:</h3>
        <div id="log" class="log"></div>
    </div>

    <script src="script.js"></script>
    <script>
        function log(message) {
            console.log(message);
            const logDiv = document.getElementById('log');
            logDiv.textContent += message + '\n';
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        // Override showNotification to log instead
        function showNotification(message, type) {
            log(`📢 Notification (${type}): ${message}`);
        }
        
        // Test if functions exist
        document.addEventListener('DOMContentLoaded', function() {
            log('📄 Page loaded');
            
            if (typeof bookFlight === 'function') {
                log('✅ bookFlight function exists');
            } else {
                log('❌ bookFlight function not found');
            }
            
            if (typeof extractFlightDataFromCard === 'function') {
                log('✅ extractFlightDataFromCard function exists');
            } else {
                log('❌ extractFlightDataFromCard function not found');
            }
            
            log('🎯 Ready to test booking!');
        });
    </script>
</body>
</html>
